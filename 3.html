<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up - BalanceSplitter</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  body {
    min-height: 100vh;
    background: #0a0a0a;
    color: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
    overflow-x: hidden;
  }

  /* Animated background gradient */
  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(16, 185, 129, 0.08) 0%, transparent 50%);
    animation: pulse 8s ease-in-out infinite;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    top: 50%;
    right: -50%;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, rgba(5, 150, 105, 0.06) 0%, transparent 50%);
    animation: pulse 10s ease-in-out infinite reverse;
    z-index: 0;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.5; }
    50% { transform: scale(1.1); opacity: 0.8; }
  }

  .signup-container {
    background: rgba(20, 20, 20, 0.8);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(16, 185, 129, 0.2);
    border-radius: 24px;
    padding: 48px 40px;
    width: 100%;
    max-width: 460px;
    box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5),
                0 0 100px rgba(16, 185, 129, 0.1);
    position: relative;
    z-index: 1;
  }

  .logo-section {
    text-align: center;
    margin-bottom: 32px;
  }

  .logo {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .logo-icon {
    width: 48px;
    height: 48px;
    background: linear-gradient(135deg, #10b981, #059669);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    font-weight: 700;
    color: #000;
    box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3);
  }

  .logo-text {
    font-size: 24px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: -0.5px;
  }

  .logo-text span {
    color: #10b981;
  }

  .welcome-text {
    color: #a0a0a0;
    font-size: 15px;
    margin-bottom: 8px;
  }

  h1 {
    font-size: 28px;
    font-weight: 700;
    color: #ffffff;
    margin-bottom: 8px;
    letter-spacing: -0.5px;
  }

  .subtitle {
    color: #808080;
    font-size: 14px;
    margin-bottom: 32px;
  }

  /* Google Signup Button */
  .google-btn {
    width: 100%;
    padding: 14px;
    background: #ffffff;
    color: #1f1f1f;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    transition: all 0.3s ease;
    margin-bottom: 24px;
  }

  .google-btn:hover {
    background: #f0f0f0;
    transform: translateY(-1px);
    box-shadow: 0 8px 20px rgba(255, 255, 255, 0.1);
  }

  .google-icon {
    width: 20px;
    height: 20px;
  }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 24px;
    color: #606060;
    font-size: 13px;
  }

  .divider::before,
  .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(16, 185, 129, 0.3), transparent);
  }

  /* Form Styles */
  .form-group {
    margin-bottom: 20px;
    position: relative;
  }

  .form-group label {
    display: block;
    color: #b0b0b0;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 8px;
    letter-spacing: 0.3px;
  }

  .input-wrapper {
    position: relative;
    display: flex;
    align-items: center;
  }

  .input-icon {
    position: absolute;
    left: 16px;
    color: #606060;
    pointer-events: none;
    transition: color 0.3s ease;
  }

  .form-input {
    width: 100%;
    padding: 14px 16px 14px 48px;
    background: rgba(30, 30, 30, 0.8);
    border: 1.5px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    color: #ffffff;
    font-size: 15px;
    transition: all 0.3s ease;
    outline: none;
  }

  .form-input::placeholder {
    color: #606060;
  }

  .form-input:focus {
    border-color: #10b981;
    background: rgba(30, 30, 30, 1);
    box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
  }

  .form-input:focus + .input-icon,
  .form-input:focus ~ .input-icon {
    color: #10b981;
  }

  .form-input:focus ~ .input-icon,
  .input-wrapper:focus-within .input-icon {
    color: #10b981;
  }

  .password-toggle {
    position: absolute;
    right: 16px;
    background: none;
    border: none;
    color: #606060;
    cursor: pointer;
    padding: 4px;
    display: flex;
    align-items: center;
    transition: color 0.3s ease;
  }

  .password-toggle:hover {
    color: #10b981;
  }

  .password-strength {
    margin-top: 8px;
    height: 4px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 2px;
    overflow: hidden;
    display: none;
  }

  .password-strength.show {
    display: block;
  }

  .password-strength-bar {
    height: 100%;
    width: 0%;
    background: #10b981;
    transition: all 0.3s ease;
    border-radius: 2px;
  }

  /* Checkbox */
  .checkbox-group {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 24px;
  }

  .custom-checkbox {
    position: relative;
    display: inline-block;
    width: 20px;
    height: 20px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .custom-checkbox input {
    position: absolute;
    opacity: 0;
    width: 0;
    height: 0;
  }

  .checkmark {
    position: absolute;
    top: 0;
    left: 0;
    width: 20px;
    height: 20px;
    background: rgba(30, 30, 30, 0.8);
    border: 1.5px solid rgba(255, 255, 255, 0.2);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .custom-checkbox input:checked ~ .checkmark {
    background: #10b981;
    border-color: #10b981;
  }

  .checkmark::after {
    content: '';
    position: absolute;
    display: none;
    left: 6px;
    top: 2px;
    width: 6px;
    height: 11px;
    border: solid #000;
    border-width: 0 2.5px 2.5px 0;
    transform: rotate(45deg);
  }

  .custom-checkbox input:checked ~ .checkmark::after {
    display: block;
  }

  .checkbox-label {
    color: #a0a0a0;
    font-size: 13px;
    line-height: 1.5;
    cursor: pointer;
  }

  .checkbox-label a {
    color: #10b981;
    text-decoration: none;
    font-weight: 500;
    transition: color 0.3s ease;
  }

  .checkbox-label a:hover {
    color: #34d399;
    text-decoration: underline;
  }

  /* Submit Button */
  .signup-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #10b981, #059669);
    color: #000000;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s ease;
    letter-spacing: 0.3px;
    position: relative;
    overflow: hidden;
  }

  .signup-btn::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
    transition: left 0.5s ease;
  }

  .signup-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(16, 185, 129, 0.4);
  }

  .signup-btn:hover::before {
    left: 100%;
  }

  .signup-btn:active {
    transform: translateY(0);
  }

  .signup-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
  }

  /* Login Link */
  .login-link {
    text-align: center;
    margin-top: 24px;
    color: #808080;
    font-size: 14px;
  }

  .login-link a {
    color: #10b981;
    text-decoration: none;
    font-weight: 600;
    transition: color 0.3s ease;
  }

  .login-link a:hover {
    color: #34d399;
  }

  /* Error States */
  .form-input.error {
    border-color: #ef4444;
  }

  .error-message {
    color: #ef4444;
    font-size: 12px;
    margin-top: 6px;
    display: none;
  }

  .error-message.show {
    display: block;
  }

  /* Responsive */
  @media (max-width: 480px) {
    .signup-container {
      padding: 32px 24px;
    }
    
    h1 {
      font-size: 24px;
    }
  }

  /* Loading spinner */
  .spinner {
    display: none;
    width: 20px;
    height: 20px;
    border: 2.5px solid rgba(0, 0, 0, 0.3);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .signup-btn.loading .btn-text {
    display: none;
  }

  .signup-btn.loading .spinner {
    display: block;
  }
</style>
</head>
<body>
  <div class="signup-container">
    <div class="logo-section">
      <div class="logo">
        <div class="logo-icon">$</div>
        <div class="logo-text">Balance<span>Splitter</span></div>
      </div>
      <h1>Create your account</h1>
      <p class="subtitle">Start splitting expenses with friends today</p>
    </div>

    <button type="button" class="google-btn" id="googleSignup">
      <svg class="google-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </button>

    <div class="divider">or sign up with email</div>

    <form id="signupForm" novalidate>
      <div class="form-group">
        <label for="name">Full Name</label>
        <div class="input-wrapper">
          <input type="text" id="name" name="name" class="form-input" placeholder="John Doe" required>
          <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </div>
        <div class="error-message" id="nameError">Please enter your name</div>
      </div>

      <div class="form-group">
        <label for="username">Username</label>
        <div class="input-wrapper">
          <input type="text" id="username" name="username" class="form-input" placeholder="johndoe123" required>
          <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="8.5" cy="7" r="4"/>
            <line x1="20" y1="8" x2="20" y2="14"/>
            <line x1="23" y1="11" x2="17" y2="11"/>
          </svg>
        </div>
        <div class="error-message" id="usernameError">Username must be 3-20 characters</div>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <div class="input-wrapper">
          <input type="email" id="email" name="email" class="form-input" placeholder="you@example.com" required>
          <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
        </div>
        <div class="error-message" id="emailError">Please enter a valid email</div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <input type="password" id="password" name="password" class="form-input" placeholder="Create a strong password" required>
          <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <button type="button" class="password-toggle" id="passwordToggle">
            <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <div class="password-strength" id="passwordStrength">
          <div class="password-strength-bar" id="passwordStrengthBar"></div>
        </div>
        <div class="error-message" id="passwordError">Password must be at least 8 characters</div>
      </div>

      <div class="checkbox-group">
        <label class="custom-checkbox">
          <input type="checkbox" id="terms" name="terms" required>
          <span class="checkmark"></span>
        </label>
        <label for="terms" class="checkbox-label">
          I agree to the <a href="#terms">Terms of Service</a> and <a href="#privacy">Privacy Policy</a>
        </label>
      </div>

      <button type="submit" class="signup-btn" id="signupBtn">
        <span class="btn-text">Create Account</span>
        <div class="spinner"></div>
      </button>
    </form>

    <div class="login-link">
      Already have an account? <a href="#login">Log in</a>
    </div>
  </div>

<script>
  // Password visibility toggle
  const passwordToggle = document.getElementById('passwordToggle');
  const passwordInput = document.getElementById('password');
  const eyeIcon = document.getElementById('eyeIcon');

  passwordToggle.addEventListener('click', () => {
    if (passwordInput.type === 'password') {
      passwordInput.type = 'text';
      eyeIcon.innerHTML = `
        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
        <line x1="1" y1="1" x2="23" y2="23"/>
      `;
    } else {
      passwordInput.type = 'password';
      eyeIcon.innerHTML = `
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
        <circle cx="12" cy="12" r="3"/>
      `;
    }
  });

  // Password strength indicator
  const passwordStrength = document.getElementById('passwordStrength');
  const passwordStrengthBar = document.getElementById('passwordStrengthBar');

  passwordInput.addEventListener('input', () => {
    const password = passwordInput.value;
    if (password.length > 0) {
      passwordStrength.classList.add('show');
      const strength = calculatePasswordStrength(password);
      passwordStrengthBar.style.width = strength + '%';
      
      if (strength < 40) {
        passwordStrengthBar.style.background = '#ef4444';
      } else if (strength < 70) {
        passwordStrengthBar.style.background = '#f59e0b';
      } else {
        passwordStrengthBar.style.background = '#10b981';
      }
    } else {
      passwordStrength.classList.remove('show');
    }
  });

  function calculatePasswordStrength(password) {
    let strength = 0;
    if (password.length >= 8) strength += 25;
    if (password.length >= 12) strength += 15;
    if (/[a-z]/.test(password)) strength += 15;
    if (/[A-Z]/.test(password)) strength += 15;
    if (/[0-9]/.test(password)) strength += 15;
    if (/[^A-Za-z0-9]/.test(password)) strength += 15;
    return Math.min(strength, 100);
  }

  // Form validation
  const form = document.getElementById('signupForm');
  const nameInput = document.getElementById('name');
  const usernameInput = document.getElementById('username');
  const emailInput = document.getElementById('email');
  const termsInput = document.getElementById('terms');

  function showError(input, errorId) {
    input.classList.add('error');
    document.getElementById(errorId).classList.add('show');
  }

  function clearError(input, errorId) {
    input.classList.remove('error');
    document.getElementById(errorId).classList.remove('show');
  }

  nameInput.addEventListener('input', () => clearError(nameInput, 'nameError'));
  usernameInput.addEventListener('input', () => clearError(usernameInput, 'usernameError'));
  emailInput.addEventListener('input', () => clearError(emailInput, 'emailError'));
  passwordInput.addEventListener('input', () => clearError(passwordInput, 'passwordError'));

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    let isValid = true;

    if (nameInput.value.trim().length < 2) {
      showError(nameInput, 'nameError');
      isValid = false;
    }

    if (usernameInput.value.trim().length < 3 || usernameInput.value.trim().length > 20) {
      showError(usernameInput, 'usernameError');
      isValid = false;
    }

    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(emailInput.value)) {
      showError(emailInput, 'emailError');
      isValid = false;
    }

    if (passwordInput.value.length < 8) {
      showError(passwordInput, 'passwordError');
      isValid = false;
    }

    if (!termsInput.checked) {
      alert('Please accept the Terms of Service and Privacy Policy');
      isValid = false;
    }

    if (isValid) {
      const btn = document.getElementById('signupBtn');
      btn.classList.add('loading');
      btn.disabled = true;
      
      // Simulate API call
      setTimeout(() => {
        alert('Account created successfully! Welcome to BalanceSplitter!');
        btn.classList.remove('loading');
        btn.disabled = false;
      }, 2000);
    }
  });

  // Google signup
  document.getElementById('googleSignup').addEventListener('click', () => {
    alert('Redirecting to Google authentication...');
  });
</script>
</body>
</html>
